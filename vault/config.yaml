# ECE Configuration
# ------------------
# Human-readable settings for the Eternal Context Engine.
# Environment variables (OMNI_*) always take priority over this file.
# Uncomment and change any value to override the default.
#
# Full reference: github.com/KCommader/Command-Center-AI-Eternal-Context-Engine

# ── Embedding ──────────────────────────────────────────────────────────────
# The model used to convert text into vectors for semantic search.
# Default is multilingual (EN, ES, ZH, PT, JA, RU + 50 more languages).
# Changing this requires a full reindex: python engine/omniscience.py reindex
embedding:
  model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  # English-only (faster, smaller): BAAI/bge-small-en-v1.5
  # Best multilingual (larger, slower): BAAI/bge-m3
  # nomic-embed-text-v1.5: high quality but 6× slower on CPU, needs einops.
  #   Requires task prefixes (set both if using nomic):
  # query_prefix: "search_query: "
  # document_prefix: "search_document: "
  #
  # Performance guide (CPU-only):
  #   paraphrase-multilingual-MiniLM-L12-v2: ~40ms/query, 384-dim, 50+ langs
  #   BAAI/bge-small-en-v1.5:                ~35ms/query, 384-dim, EN only
  #   nomic-embed-text-v1.5:                ~254ms/query, 768-dim, EN (needs einops)
  #   BAAI/bge-m3:                          ~400ms/query, 1024-dim, 100+ langs
  #
  # Quality vs corpus size: on small vaults (<50 docs), MiniLM is the right
  # default. Larger models only outperform on 500+ doc corpora where they
  # need to discriminate between many similar documents.

# ── Search ─────────────────────────────────────────────────────────────────
search:
  # Default search mode: strict | balanced | exploratory
  mode: balanced

  # BM25 keyword search — finds exact token matches that vector may miss
  bm25_enabled: true
  bm25_candidates: 40   # how many BM25-only candidates to fetch per query

  # CrossEncoder reranker — rescores merged vector + BM25 candidates
  # This is a small neural model (~44MB) that scores every candidate against
  # your query. Not a generative LLM — pure scoring, fast, runs fully local.
  # Upgrade option: BAAI/bge-reranker-base (~278MB, best quality/size ratio)
  rerank_enabled: true
  rerank_model: cross-encoder/ms-marco-MiniLM-L-12-v2
  rerank_candidates: 36
  rerank_min_candidates: 5    # skip reranker if fewer than N results (saves ~93ms)
  rerank_cpu_gate: 85         # skip reranker if CPU usage >= N% (0 = disabled)

  # Query expansion — appends related vocab terms before searching
  query_expansion_enabled: true
  query_expansion_terms: 5

# ── Chunking ───────────────────────────────────────────────────────────────
chunking:
  max_chars: 1500   # max characters per chunk (section splits here)
  min_chars: 80     # chunks smaller than this are discarded

# ── Memory ─────────────────────────────────────────────────────────────────
memory:
  # Classifier mode for store() routing:
  #   regex  — fast, deterministic, default (no extra deps)
  #   llm    — local Ollama fallback for nuanced content (requires Ollama)
  #   hybrid — regex first, LLM for low-confidence results
  classifier_mode: regex

  # Store rate limit: max writes per minute per agent (0 = disabled)
  store_rate_limit: 30

  # Dedup threshold: skip storing content this similar to existing (0 = disabled)
  store_dedup_threshold: 0.92

# ── Privacy ────────────────────────────────────────────────────────────────
privacy:
  # Namespaces excluded from all default searches.
  # vault/Local/ is always local_only. Add your own private zones here.
  private_namespaces:
    - local_only
  # Examples:
  #   - diary
  #   - medical
  #   - financial

# ── Reindex ────────────────────────────────────────────────────────────────
reindex:
  # Throttle: sleep N ms between files during reindex to yield CPU to
  # interactive queries. On <8 thread machines this prevents reindex from
  # starving search. 50ms × 20 files = 1s total overhead.
  throttle_ms: 50

# ── Advanced ───────────────────────────────────────────────────────────────
# advanced:
#   api_port: 8765
#   api_host: 127.0.0.1
#   query_cache_ttl_sec: 3600
#   query_cache_max_items: 256
#   rerank_batch_size: 16
