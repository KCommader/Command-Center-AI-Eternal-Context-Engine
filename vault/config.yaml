# ECE Configuration
# ------------------
# Human-readable settings for the Eternal Context Engine.
# Environment variables (OMNI_*) always take priority over this file.
# Uncomment and change any value to override the default.
#
# Full reference: github.com/KCommader/Command-Center-AI-Eternal-Context-Engine

# ── Embedding ──────────────────────────────────────────────────────────────
# The model used to convert text into vectors for semantic search.
# Default is multilingual (EN, ES, ZH, PT, JA, RU + 50 more languages).
# Changing this requires a full reindex: python engine/omniscience.py reindex
embedding:
  # ── Model Tiers — pick one ─────────────────────────────────────────────────
  #
  #  LIGHT    (~90MB,  384-dim, EN only)   BAAI/bge-small-en-v1.5
  #  DEFAULT  (~130MB, 384-dim, 50+ langs) sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  #  BALANCED (~270MB, 384-dim, EN+ES+100) intfloat/multilingual-e5-small
  #  POWER    (~1.2GB, 768-dim, EN+ES+70)  Alibaba-NLP/gte-multilingual-base  ← recommended upgrade
  #
  #  All models run 100% local/offline. Changing model requires reindex:
  #    python engine/omniscience.py reindex
  #
  #  POWER tier benefits: 8192-token context (vs 512), better recall, elastic dims.
  #  Requires trust_remote_code=True — handled automatically by the engine.
  #
  model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2  # DEFAULT — works on any machine
  # model: Alibaba-NLP/gte-multilingual-base  # POWER tier — best quality, requires 8GB+ RAM + reindex

# ── Search ─────────────────────────────────────────────────────────────────
search:
  # Default search mode: strict | balanced | exploratory
  mode: balanced

  # BM25 keyword search — finds exact token matches that vector may miss
  bm25_enabled: true
  bm25_candidates: 40   # how many BM25-only candidates to fetch per query

  # CrossEncoder reranker — rescores merged vector + BM25 candidates
  # This is a small neural model (~44MB) that scores every candidate against
  # your query. Not a generative LLM — pure scoring, fast, runs fully local.
  # Upgrade option: BAAI/bge-reranker-base (~278MB, best quality/size ratio)
  rerank_enabled: true
  rerank_model: cross-encoder/ms-marco-MiniLM-L-12-v2
  rerank_candidates: 36
  rerank_min_candidates: 5    # skip reranker if fewer than N results (saves ~93ms)
  rerank_cpu_gate: 85         # skip reranker if CPU usage >= N% (0 = disabled)

  # Query expansion — appends related vocab terms before searching
  query_expansion_enabled: true
  query_expansion_terms: 5

# ── Chunking ───────────────────────────────────────────────────────────────
chunking:
  max_chars: 1500   # max characters per chunk (section splits here)
  min_chars: 80     # chunks smaller than this are discarded

# ── Memory ─────────────────────────────────────────────────────────────────
memory:
  # Classifier mode for store() routing:
  #   regex  — fast, deterministic, default (no extra deps)
  #   llm    — local Ollama fallback for nuanced content (requires Ollama)
  #   hybrid — regex first, LLM for low-confidence results
  classifier_mode: regex

  # Store rate limit: max writes per minute per agent (0 = disabled)
  store_rate_limit: 30

  # Dedup threshold: skip storing content this similar to existing (0 = disabled)
  store_dedup_threshold: 0.92

# ── Namespaces ─────────────────────────────────────────────────────────────
# Controls which namespaces the grounding filter treats as high-quality evidence.
# trusted   → included in default grounded searches (show in search results)
# low_trust → deprioritized but not excluded (raw chats, inbox, etc.)
namespaces:
  trusted:
    - company_core      # SOUL.md, USER.md, ACTIVE_CONTEXT.md, Core files
    - company_memory    # stored memories
    - knowledge         # Knowledge/ vault files
    - projects          # project docs
    - legal_ip          # legal/IP docs
    - bots_runtime      # live bot state and logs
    - skills            # skill library rows — large namespace, must be trusted
    - migration         # migration history — useful context
    - agent_cowork      # cowork agent memory
    - agent_codex       # codex agent memory
    - home_md           # home directory markdown
    - templates         # vault templates
  low_trust:
    - raw_chats
    - chat_imports
    - inbox
    - scratch
    - dashboard_md

# ── Privacy ────────────────────────────────────────────────────────────────
privacy:
  # Namespaces excluded from all default searches.
  # vault/Local/ is always local_only. Add your own private zones here.
  private_namespaces:
    - local_only
  # Examples:
  #   - diary
  #   - medical
  #   - financial

# ── Reindex ────────────────────────────────────────────────────────────────
reindex:
  # Throttle: sleep N ms between files during reindex to yield CPU to
  # interactive queries. On <8 thread machines this prevents reindex from
  # starving search. 50ms × 20 files = 1s total overhead.
  throttle_ms: 50

# ── MCP Network ────────────────────────────────────────────────────────────
# Settings for the HTTP MCP endpoint used by remote agents and other machines.
mcp:
  port: 8766
  # Bearer token to secure the MCP endpoint.
  # Set this if your MCP port is accessible over the network (NAS, LAN, VPN).
  # Leave empty for local-only open access.
  # key: your_secret_token_here
  #
  # OMNI_MCP_KEY env var always takes priority over this setting.

# ── Advanced ───────────────────────────────────────────────────────────────
# advanced:
#   api_port: 8765
#   api_host: 127.0.0.1
#   query_cache_ttl_sec: 3600
#   query_cache_max_items: 256
#   rerank_batch_size: 16
